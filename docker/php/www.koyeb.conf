; Minimal php-fpm pool for low-RAM environments (256MB)
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; Static with only 2 workers to save RAM
pm = static
pm.max_children = 2
pm.max_requests = 500

; Logging
access.log = /dev/null
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
